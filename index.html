<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow Piano</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080B14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Press Start 2P", monospace;
      color: #fff;
      overflow-x: hidden;
      padding: 24px 16px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(255,45,120,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(120,50,255,0.15) 0%, transparent 50%);
      pointer-events: none;
    }
    .app { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    .title { font-size: clamp(16px, 3vw, 26px); color: #FF2D78; text-shadow: 0 0 18px rgba(255,45,120,0.9); letter-spacing: 4px; text-align: center; }
    .subtitle { font-size: 8px; color: #6A5A8A; margin-top: 8px; letter-spacing: 2px; text-align: center; }
    .active-notes { display: flex; gap: 6px; height: 26px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .note-pill { font-size: 7px; background: rgba(255,45,120,0.2); border: 1px solid rgba(255,45,120,0.6); border-radius: 4px; padding: 4px 8px; color: #FF7BAC; }
    .piano-wrap { background: linear-gradient(180deg, #1E1438 0%, #160F2A 100%); border: 2px solid rgba(255,45,120,0.35); border-radius: 18px; padding: 18px 22px 26px; box-shadow: 0 0 50px rgba(255,45,120,0.18); overflow-x: auto; max-width: 100vw; }
    .piano-and-wheel { display: flex; align-items: flex-start; gap: 14px; }
    .pitch-wheel-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding-top: 24px; /* align with top of keys */
    }
    .pitch-wheel-label { font-size: 6px; color: #7060A0; letter-spacing: 1px; }
    .pitch-wheel-track {
      position: relative; width: 28px; height: 164px;
      background: #1A1030; border: 1px solid #4A3888;
      border-radius: 14px; cursor: ns-resize;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }
    .pitch-wheel-notch {
      position: absolute; left: 4px; right: 4px; height: 2px;
      background: rgba(255,45,120,0.25); top: 50%; transform: translateY(-50%);
      border-radius: 1px;
    }
    .pitch-wheel-thumb {
      position: absolute; left: 3px; right: 3px; height: 32px;
      background: linear-gradient(180deg, #7060C0, #4A3888);
      border-radius: 8px; top: calc(50% - 16px);
      box-shadow: 0 0 8px rgba(170,136,255,0.6);
      cursor: ns-resize; transition: background 0.1s;
      border: 1px solid #AA88FF;
    }
    .pitch-wheel-thumb.active { background: linear-gradient(180deg, #FF2D78, #AA2060); box-shadow: 0 0 12px rgba(255,45,120,0.8); border-color: #FF2D78; }
    .pitch-wheel-val { font-size: 6px; color: #7060A0; min-width: 28px; text-align: center; }
    .octave-bar { font-size: 6px; color: #4A3868; text-align: center; margin-bottom: 10px; letter-spacing: 3px; }
    .keyboard { position: relative; height: 164px; }
    .key { position: absolute; cursor: pointer; user-select: none; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 7px; }
    .key-note { font-size: 5px; opacity: 0.4; margin-bottom: 3px; }
    .key-label { font-size: 7px; opacity: 0.55; }
    .key.white { width: 44px; height: 164px; background: linear-gradient(180deg, #EDE6F8 0%, #D8CEEE 100%); border: 1px solid #9580C0; border-top: none; border-radius: 0 0 8px 8px; top: 0; z-index: 1; box-shadow: inset 0 -4px 8px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.4); }
    .key.white .key-note { color: #6A50A0; }
    .key.white .key-label { color: #4A387A; }
    .key.white.pressed { background: linear-gradient(180deg, #FF8AAF 0%, #FF5585 100%); box-shadow: 0 0 16px rgba(255,85,133,0.9); transform: translateY(2px); }
    .key.white.pressed .key-label, .key.white.pressed .key-note { color: #fff; opacity: 0.9; }
    .key.black { width: 28px; height: 100px; background: linear-gradient(180deg, #241650 0%, #160C38 60%, #100828 100%); border: 1px solid #4A3888; border-radius: 0 0 6px 6px; top: 0; z-index: 2; padding-bottom: 6px; box-shadow: 0 5px 10px rgba(0,0,0,0.6); }
    .key.black .key-note { color: #7060B0; font-size: 4px; }
    .key.black .key-label { color: #8070C0; font-size: 6px; }
    .key.black.pressed { background: linear-gradient(180deg, #FF2D78 0%, #C40055 100%); box-shadow: 0 0 14px rgba(255,45,120,1); transform: translateY(1px); }
    .key.black.pressed .key-label, .key.black.pressed .key-note { color: #fff; opacity: 0.9; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .btn { font-family: "Press Start 2P", monospace; font-size: 8px; padding: 10px 14px; border: 2px solid; border-radius: 8px; cursor: pointer; background: transparent; }
    .btn:active { transform: scale(0.96); }
    .btn-record { color: #FF5555; border-color: #FF5555; }
    .btn-record.active { background: #FF5555; color: #fff; animation: recPulse 0.9s ease-in-out infinite; }
    @keyframes recPulse { 0%,100% { box-shadow: 0 0 6px rgba(255,85,85,0.7); } 50% { box-shadow: 0 0 22px rgba(255,85,85,1); } }
    .btn-play { color: #44FF88; border-color: #44FF88; }
    .btn-play:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-loop { color: #88AAFF; border-color: #88AAFF; font-size: 7px; }
    .btn-loop:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-loop.active { background: #88AAFF; color: #080B14; }
    .btn-stop { color: #FFAA44; border-color: #FFAA44; }
    .btn-clear { color: #7060A0; border-color: #7060A0; font-size: 7px; }
    .status { font-size: 8px; color: #6A5A8A; min-height: 16px; text-align: center; }
    .status.recording { color: #FF5555; animation: blink 0.9s step-end infinite; }
    .status.playing { color: #44FF88; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .key-guide { font-size: 7px; color: #4A3868; text-align: center; line-height: 2; letter-spacing: 1px; }
    .key-guide span { color: #7060A0; }
    #waveCanvas { border: 1px solid rgba(255,45,120,0.2); border-radius: 8px; background: rgba(255,45,120,0.04); }
    .cat-float { position: fixed; pointer-events: none; z-index: 0; animation: floatUp linear infinite; opacity: 0; }
    @keyframes floatUp { 0% { transform: translateY(110vh); opacity: 0; } 8% { opacity: 0.07; } 92% { opacity: 0.07; } 100% { transform: translateY(-120px); opacity: 0; } }
  </style>
</head>
<body>
<div class="app">
  <div>
    <div class="title">&#x1F431; MEOW PIANO &#x1F431;</div>
    <div class="subtitle">featuring: silas (real cat, real meows)</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <canvas id="waveCanvas" width="300" height="50"></canvas>
    <div class="active-notes" id="activeNotes"></div>
  </div>
  <div class="piano-wrap">
    <div class="piano-and-wheel">
    <div>
    <div class="octave-bar">C4 &lt;------- C5 -------&gt; C6</div>
    <div class="keyboard" id="keyboard"></div>
    </div>
    <div class="pitch-wheel-wrap">
      <div class="pitch-wheel-label">PITCH</div>
      <div class="pitch-wheel-track" id="pitchTrack">
        <div class="pitch-wheel-notch"></div>
        <div class="pitch-wheel-thumb" id="pitchThumb"></div>
      </div>
      <div class="pitch-wheel-val" id="pitchVal">0</div>
    </div>
    </div></div>
  <div class="controls">
    <button class="btn btn-record" id="btnRecord">&#x23FA; REC</button>
    <button class="btn btn-play"   id="btnPlay" disabled>&#x25B6; PLAY</button>
    <button class="btn btn-loop"   id="btnLoop" disabled>&#x21BA; LOOP</button>
    <div style="position:relative;display:inline-flex;border:2px solid #44DDFF;border-radius:8px;overflow:hidden;cursor:pointer"><button id="btnSustain" style="font-family:'Press Start 2P',monospace;font-size:8px;padding:10px 10px 10px 14px;background:transparent;border:none;color:#44DDFF;cursor:pointer;letter-spacing:1px">SUSTAIN</button><button id="btnSustainLock" style="font-family:'Press Start 2P',monospace;font-size:7px;padding:10px 10px;background:rgba(68,221,255,0.08);border:none;border-left:2px solid #44DDFF;color:#44DDFF;cursor:pointer;opacity:0.5" title="Lock sustain">&#x1F512;</button></div>
    <button class="btn btn-stop"   id="btnStop">&#x25A0; STOP</button>
    <button class="btn btn-clear"  id="btnClear">&#x2715; CLR</button>
  </div>
  <div class="status" id="status">loading meow...</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <button class="btn" id="btnLoopEdit" style="color:#AA88FF;border-color:#AA88FF;font-size:7px">&#x25BC; SETTINGS</button>
    <div id="loopPanel" style="display:none;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:420px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:7px;color:#7060A0;letter-spacing:1px">OCTAVE</span>
        <div style="display:flex;gap:4px" id="octaveBtns">
          <button class="btn" onclick="setOctave(-2)" id="oct-2" style="font-size:7px;padding:6px 8px;color:#AA88FF;border-color:#AA88FF">-2</button>
          <button class="btn" onclick="setOctave(-1)" id="oct-1" style="font-size:7px;padding:6px 8px;color:#AA88FF;border-color:#AA88FF">-1</button>
          <button class="btn" onclick="setOctave(0)"  id="oct0"  style="font-size:7px;padding:6px 8px;color:#080B14;border-color:#AA88FF;background:#AA88FF">0</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;width:100%;max-width:360px">
        <span style="font-size:7px;color:#7060A0;width:60px;text-align:right;letter-spacing:1px">DECAY</span>
        <input type="range" id="decaySlider" min="1" max="30" step="0.5" value="20.0" style="flex:1;accent-color:#FF2D78">
        <span style="font-size:7px;color:#FF7BAC;width:36px" id="decayLbl">20.0s</span>
      </div>
      <div style="font-size:7px;color:#6A5A8A;letter-spacing:1px">DRAG HANDLES TO SET LOOP IN / OUT</div>
      <div id="sliderTrack" style="position:relative;width:360px;height:28px;cursor:pointer">
        <div style="position:absolute;top:12px;left:0;right:0;height:4px;background:#2A1F44;border-radius:2px"></div>
        <div id="sliderFill" style="position:absolute;top:12px;height:4px;background:#FF2D78;border-radius:2px"></div>
        <div id="handleStart" style="position:absolute;top:2px;width:24px;height:24px;background:#FF2D78;border-radius:50%;cursor:grab;transform:translateX(-50%);box-shadow:0 0 8px rgba(255,45,120,0.8);display:flex;align-items:center;justify-content:center">
          <span style="font-size:5px;color:#fff;pointer-events:none">IN</span>
        </div>
        <div id="handleEnd" style="position:absolute;top:2px;width:24px;height:24px;background:#AA88FF;border-radius:50%;cursor:grab;transform:translateX(-50%);box-shadow:0 0 8px rgba(170,136,255,0.8);display:flex;align-items:center;justify-content:center">
          <span style="font-size:5px;color:#fff;pointer-events:none">OUT</span>
        </div>
      </div>
      <div style="display:flex;gap:20px">
        <span style="font-size:7px;color:#FF7BAC">IN: <span id="lblStart">0.10</span>s</span>
        <span style="font-size:7px;color:#BB99FF">OUT: <span id="lblEnd">0.60</span>s</span>
      </div>
    </div>
  </div>
  <div class="key-guide">
    WHITE: <span>A S D F G H J K L ; ' Z X C V</span><br>
    BLACK: <span>W E &nbsp; T Y U &nbsp; O P &nbsp; [ ] \</span>
  </div>
</div>

var SAMPLE_ROOT = 440.0;
var OCTAVE_SHIFT = 0;
var DECAY = 20.0;
var BASE_FREQS = {};  // populated after NOTES defined

function setOctave(shift) {
  OCTAVE_SHIFT = shift;
  if (isRec) recEvents.push({type:"octave", shift:shift, t:performance.now()-recStart});
  var mult = Math.pow(2, shift);
  NOTES.forEach(function(n) {
    n.freq = BASE_FREQS[n.note] * mult;
  });
  // Update octave bar label
  var labels = {"-2":"C2 <-- C3 --> C4", "-1":"C3 <-- C4 --> C5", "0":"C4 <-- C5 --> C6"};
  document.querySelector(".octave-bar").textContent = labels[shift] || "";
  // Update button styles
  [-2,-1,0].forEach(function(v) {
    var btn = document.getElementById("oct"+v);
    if (!btn) return;
    btn.style.background = (v===shift) ? "#AA88FF" : "transparent";
    btn.style.color      = (v===shift) ? "#080B14" : "#AA88FF";
  });
}

var actx = null, meowBuf = null, analyser, masterGain;
var liveVoices = {};   // voices from live playing — controlled by live SUSTAIN
var pbVoices   = {};   // voices from playback   — controlled by recorded state

function allVoices() {
  var all = {};
  Object.keys(liveVoices).forEach(function(k){ all["L:"+k] = liveVoices[k]; });
  Object.keys(pbVoices).forEach(function(k){   all["P:"+k] = pbVoices[k];   });
  return all;
}

function boot() {
  if (actx) return Promise.resolve();
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.85;
  analyser = actx.createAnalyser();
  analyser.fftSize = 512;
  masterGain.connect(analyser);
  analyser.connect(actx.destination);

  var binary = atob(MEOW_B64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return actx.decodeAudioData(bytes.buffer).then(function(buf) {
    meowBuf = buf;
    SAMPLE_DUR = buf.duration;
    setStatus("click a key or press keyboard");
  });
}

// Loop points within the sample (seconds at root pitch).
// The meow is ~0.8s. The sustained vowel sits roughly 0.30-0.58s.
// Tweak if the loop sounds clicky.
var LOOP_START = 0.10;
var LOOP_END   = 0.60;
var SAMPLE_DUR = 0.80; // approximate; refined after decode

var SUSTAIN = false;
var SUSTAIN_LOCKED = false;

function setSustain(on) {
  SUSTAIN = on;
  if (isRec) recEvents.push({type: on ? "sustain_on" : "sustain_off", t: performance.now()-recStart});
  var btn = document.getElementById("btnSustain");
  btn.style.background = SUSTAIN ? "#44DDFF" : "transparent";
  btn.style.color      = SUSTAIN ? "#080B14" : "#44DDFF";
  Object.keys(liveVoices).forEach(function(k) {
    var v = liveVoices[k];
    if (v) {
      v.src.loop = SUSTAIN;
      if (SUSTAIN) { v.src.loopStart = LOOP_START; v.src.loopEnd = LOOP_END; }
    }
  });
}

var btnSustain = document.getElementById("btnSustain");
var btnSustainLock = document.getElementById("btnSustainLock");

// Hold = pedal; click (quick tap) toggles lock if already locked
function updateSustainUI() {
  var wrap = document.getElementById("btnSustain").parentNode;
  var lockBtn = document.getElementById("btnSustainLock");
  // Main button lights up when sustain is active
  document.getElementById("btnSustain").style.color      = SUSTAIN ? "#080B14" : "#44DDFF";
  document.getElementById("btnSustain").style.background = SUSTAIN ? "#44DDFF" : "transparent";
  // Lock slice: always shows divider; lights up when locked
  lockBtn.style.color      = SUSTAIN_LOCKED ? "#080B14" : "#44DDFF";
  lockBtn.style.background = SUSTAIN_LOCKED ? "#44DDFF" : "rgba(68,221,255,0.08)";
  lockBtn.style.opacity    = "1";
  lockBtn.style.borderLeftColor = SUSTAIN ? "#080B14" : "#44DDFF";
}

btnSustain.addEventListener("pointerdown", function(e) {
  e.preventDefault();
  if (SUSTAIN_LOCKED) {
    // Push harder to pop — unlock and release
    SUSTAIN_LOCKED = false;
    setSustain(false);
  } else {
    setSustain(true);
  }
  updateSustainUI();
});
btnSustain.addEventListener("pointerup", function() {
  if (!SUSTAIN_LOCKED) { setSustain(false); updateSustainUI(); }
});
btnSustain.addEventListener("pointerleave", function() {
  if (!SUSTAIN_LOCKED) { setSustain(false); updateSustainUI(); }
});

btnSustainLock.addEventListener("pointerdown", function(e) {
  e.preventDefault();
  if (SUSTAIN_LOCKED) {
    SUSTAIN_LOCKED = false;
    setSustain(false);
  } else {
    SUSTAIN_LOCKED = true;
    setSustain(true);
  }
  updateSustainUI();
});

function applyLoopToActive() {
  Object.keys(liveVoices).forEach(function(k) {
    var v = liveVoices[k];
    if (v && v.src.loop) { v.src.loopStart = LOOP_START; v.src.loopEnd = LOOP_END; }
  });
}

// Toggle panel
document.getElementById("decaySlider").addEventListener("input", function() {
  DECAY = parseFloat(this.value);
  document.getElementById("decayLbl").textContent = DECAY.toFixed(1) + "s";
  document.getElementById("decaySlider").value = DECAY;
});

document.getElementById("btnLoopEdit").addEventListener("click", function() {
  var p = document.getElementById("loopPanel");
  var open = p.style.display !== "none";
  p.style.display = open ? "none" : "flex";
  this.innerHTML = (open ? "&#x25BC;" : "&#x25B2;") + " SETTINGS";
});

// Dual-handle slider
(function() {
  var track = document.getElementById("sliderTrack");
  var fill  = document.getElementById("sliderFill");
  var hS    = document.getElementById("handleStart");
  var hE    = document.getElementById("handleEnd");
  var lblS  = document.getElementById("lblStart");
  var lblE  = document.getElementById("lblEnd");

  var dragging = null;
  var MIN_GAP = 0.02;

  function posToVal(px) {
    var w = track.offsetWidth;
    return Math.max(0, Math.min(SAMPLE_DUR, (px / w) * SAMPLE_DUR));
  }
  function valToPos(v) {
    return (v / SAMPLE_DUR) * track.offsetWidth;
  }
  function render() {
    hS.style.left = valToPos(LOOP_START) + "px";
    hE.style.left = valToPos(LOOP_END)   + "px";
    fill.style.left  = valToPos(LOOP_START) + "px";
    fill.style.width = (valToPos(LOOP_END) - valToPos(LOOP_START)) + "px";
    lblS.textContent = LOOP_START.toFixed(2);
    lblE.textContent = LOOP_END.toFixed(2);
  }

  function onMove(e) {
    if (!dragging) return;
    var rect = track.getBoundingClientRect();
    var px = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var v = Math.round(posToVal(px) * 100) / 100;
    if (dragging === "start") {
      LOOP_START = Math.min(v, LOOP_END - MIN_GAP);
      LOOP_START = Math.max(0, LOOP_START);
    } else {
      LOOP_END = Math.max(v, LOOP_START + MIN_GAP);
      LOOP_END = Math.min(SAMPLE_DUR, LOOP_END);
    }
    render();
    applyLoopToActive();
  }

  hS.addEventListener("pointerdown", function(e) { dragging="start"; hS.style.cursor="grabbing"; e.preventDefault(); });
  hE.addEventListener("pointerdown", function(e) { dragging="end";   hE.style.cursor="grabbing"; e.preventDefault(); });
  window.addEventListener("pointermove", onMove);
  window.addEventListener("pointerup", function() {
    dragging=null; hS.style.cursor="grab"; hE.style.cursor="grab";
  });

  render();
})();



// ── Pitch wheel ───────────────────────────────────────────────────────
var PITCH_BEND = 0; // semitones, range -2 to +2
var PITCH_MAX  = 2; // semitones max bend

(function() {
  var track  = document.getElementById("pitchTrack");
  var thumb  = document.getElementById("pitchThumb");
  var valLbl = document.getElementById("pitchVal");
  var dragging = false;
  var startY, startBend;
  var trackH = 164, thumbH = 32, travel = trackH - thumbH;

  function bendToY(bend) {
    // bend=0 → center, bend=+PITCH_MAX → top, bend=-PITCH_MAX → bottom
    return (travel / 2) * (1 - bend / PITCH_MAX);
  }
  function yToBend(y) {
    return Math.max(-PITCH_MAX, Math.min(PITCH_MAX,
      (1 - y / (travel / 2)) * PITCH_MAX
    ));
  }
  function render() {
    thumb.style.top = bendToY(PITCH_BEND) + "px";
    valLbl.textContent = (PITCH_BEND >= 0 ? "+" : "") + PITCH_BEND.toFixed(2);
    applyPitchToVoices();
  }
  function applyPitchToVoices() {
    var mult = Math.pow(2, PITCH_BEND / 12);
    Object.keys(liveVoices).forEach(function(k) {
      var n = noteMap[k];
      if (n && liveVoices[k]) liveVoices[k].src.playbackRate.value = (n.freq / SAMPLE_ROOT) * mult;
    });
  }

  track.addEventListener("pointerdown", function(e) {
    dragging = true; startY = e.clientY; startBend = PITCH_BEND;
    thumb.classList.add("active");
    track.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  track.addEventListener("pointermove", function(e) {
    if (!dragging) return;
    var dy = e.clientY - startY;
    PITCH_BEND = Math.max(-PITCH_MAX, Math.min(PITCH_MAX,
      startBend - (dy / (travel / 2)) * PITCH_MAX
    ));
    PITCH_BEND = Math.round(PITCH_BEND * 100) / 100;
    render();
  });
  function release() {
    if (!dragging) return;
    dragging = false;
    thumb.classList.remove("active");
    // Spring back to center
    var steps = 20, step = 0;
    var from = PITCH_BEND;
    var interval = setInterval(function() {
      step++;
      PITCH_BEND = from * (1 - step / steps);
      if (step >= steps) { PITCH_BEND = 0; clearInterval(interval); }
      render();
    }, 16);
  }
  track.addEventListener("pointerup",     release);
  track.addEventListener("pointercancel", release);

  render();
})();

// ── Core voice factory ────────────────────────────────────────────────
function createVoice(freq, useSustain, ls, le, dec) {
  var src = actx.createBufferSource();
  src.buffer = meowBuf;
  src.playbackRate.value = (freq / SAMPLE_ROOT) * Math.pow(2, PITCH_BEND / 12);
  src.loop = useSustain;
  src.loopStart = ls;
  src.loopEnd   = le;
  var gain = actx.createGain();
  var t0 = actx.currentTime;
  if (useSustain) {
    // Long slow fade from full volume — sample has its own natural shape
    gain.gain.setValueAtTime(1.0, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + dec);
  } else {
    // No sustain — play through naturally, no imposed envelope
    gain.gain.setValueAtTime(1.0, t0);
  }
  src.connect(gain);
  gain.connect(masterGain);
  src.start();
  return {src: src, gain: gain};
}

// ── LIVE note on/off — uses live SUSTAIN/LOOP/DECAY globals ───────────
function noteOn(n) {
  if (!meowBuf || !actx) return;
  if (actx.state === "suspended") actx.resume();
  if (liveVoices[n.note]) {
    try { liveVoices[n.note].src.stop(); } catch(e) {}
    delete liveVoices[n.note];
  }
  var v = createVoice(n.freq, SUSTAIN, LOOP_START, LOOP_END, DECAY);
  liveVoices[n.note] = v;
  v.src.onended = function() {
    if (liveVoices[n.note] && liveVoices[n.note].src === v.src) {
      delete liveVoices[n.note];
      if (n.el) n.el.classList.remove("pressed");
      refreshDisplay();
    }
  };
  if (n.el) n.el.classList.add("pressed");
  refreshDisplay();
}

function noteOff(n) {
  var v = liveVoices[n.note];
  if (v && SUSTAIN) v.src.loop = false; // release loop → play to end
  if (n.el) n.el.classList.remove("pressed");
  refreshDisplay();
}

// ── PLAYBACK note on/off — uses values snapshotted at record time ─────
function pbNoteOn(n, freq, useSustain, ls, le, dec) {
  if (!meowBuf || !actx) return;
  if (pbVoices[n.note]) {
    try { pbVoices[n.note].src.stop(); } catch(e) {}
    delete pbVoices[n.note];
  }
  var v = createVoice(freq, useSustain, ls, le, dec);
  pbVoices[n.note] = v;
  v.src.onended = function() {
    if (pbVoices[n.note] && pbVoices[n.note].src === v.src) {
      delete pbVoices[n.note]; refreshDisplay();
    }
  };
  refreshDisplay();
}

function pbNoteOff(n, wasSustained) {
  var v = pbVoices[n.note];
  if (v && wasSustained) v.src.loop = false;
  refreshDisplay();
}

function pbSustainOn() {
  Object.keys(pbVoices).forEach(function(k) {
    var v = pbVoices[k];
    if (v) { v.src.loop = true; v.src.loopStart = LOOP_START; v.src.loopEnd = LOOP_END; }
  });
}

function pbSustainOff() {
  Object.keys(pbVoices).forEach(function(k) {
    var v = pbVoices[k]; if (v) v.src.loop = false;
  });
}

var isRec=false, isPlay=false, loop=false, recStart=0, recEvents=[], timers=[];

function on(n)  { noteOn(n);  if(isRec) recEvents.push({type:"on",  note:n.note, freq:n.freq, sus:SUSTAIN, ls:LOOP_START, le:LOOP_END, dec:DECAY, t:performance.now()-recStart}); }
function off(n) { noteOff(n); if(isRec) recEvents.push({type:"off", note:n.note, sus:SUSTAIN, t:performance.now()-recStart}); }

document.addEventListener("keydown", function(e) {
  if (e.repeat) return;
  if (e.key === " ") {
    if (SUSTAIN_LOCKED) { SUSTAIN_LOCKED=false; setSustain(false); }
    else setSustain(true);
    updateSustainUI(); e.preventDefault(); return;
  }
  if (e.key === "Enter") { document.getElementById("btnRecord").click(); e.preventDefault(); return; }
  var k = e.key.toLowerCase();
  if (keyMap[k]) { boot().then(function(){ on(keyMap[k]); }); e.preventDefault(); }
});
document.addEventListener("keyup", function(e) {
  if (e.key === " ") {
    if (!SUSTAIN_LOCKED) { setSustain(false); updateSustainUI(); }
    return;
  }
  var k = e.key.toLowerCase();
  if (keyMap[k]) off(keyMap[k]);
});

function refreshDisplay() {
  var notes = {};
  Object.keys(liveVoices).forEach(function(k){ notes[k]=1; });
  Object.keys(pbVoices).forEach(function(k){ notes[k]=1; });
  document.getElementById("activeNotes").innerHTML =
    Object.keys(notes).sort().map(function(n){ return "<div class=\"note-pill\">" + n + "</div>"; }).join("");
}

function setStatus(t, c) { var s=document.getElementById("status"); s.textContent=t; s.className="status "+(c||""); }

var btnRecord=document.getElementById("btnRecord");

btnRecord.addEventListener("click", function() {
  if (isPlay) stopPb();
  if (isRec) {
    isRec=false; btnRecord.classList.remove("active"); btnRecord.textContent="REC";
    setStatus("recorded " + ((performance.now()-recStart)/1000).toFixed(2) + "s");
    if (recEvents.length) { document.getElementById("btnPlay").disabled=false; document.getElementById("btnLoop").disabled=false; }
  } else {
    recEvents=[]; isRec=true; recStart=performance.now();
    btnRecord.classList.add("active"); btnRecord.textContent="● REC";
    document.getElementById("btnPlay").disabled=true; document.getElementById("btnLoop").disabled=true;
    setStatus("RECORDING...","recording");
    boot();
  }
});

function startPb() {
  if (!recEvents.length) return;
  isPlay=true; setStatus("PLAYING...","playing");
  // Playback runs entirely in pbVoices — never touches liveVoices or live SUSTAIN
  var maxT = recEvents.reduce(function(m,e){ return Math.max(m,e.t); }, 0);
  recEvents.forEach(function(ev) {
    timers.push(setTimeout(function() {
      if (ev.type==="octave") { return; } // freq already baked into each note-on event
      if (ev.type==="sustain_on")  { pbSustainOn();  return; }
      if (ev.type==="sustain_off") { pbSustainOff(); return; }
      var n = noteMap[ev.note];
      if (!n) return;
      if (ev.type==="on")  pbNoteOn(n, ev.freq, ev.sus, ev.ls, ev.le, ev.dec);
      if (ev.type==="off") pbNoteOff(n, ev.sus);
    }, ev.t));
  });
  timers.push(setTimeout(function() {
    isPlay=false;
    pbSustainOff();
    if (loop) { timers=[]; startPb(); } else setStatus("done");
  }, maxT+800));
}

function stopPb() {
  timers.forEach(clearTimeout); timers=[]; isPlay=false;
  // Kill all playback voices cleanly
  Object.keys(pbVoices).forEach(function(k) {
    try { pbVoices[k].src.stop(); } catch(e) {}
  });
  pbVoices = {};
  refreshDisplay();
}

document.getElementById("btnPlay").addEventListener("click", function() {
  if (isRec) return;
  if (isPlay) { stopPb(); setStatus("stopped"); } else startPb();
});
document.getElementById("btnLoop").addEventListener("click", function() {
  if (document.getElementById("btnLoop").disabled) return;
  loop=!loop; document.getElementById("btnLoop").classList.toggle("active",loop);
  if (loop && !isPlay && recEvents.length) startPb();
});
document.getElementById("btnStop").addEventListener("click", function() {
  if (isRec) { isRec=false; btnRecord.classList.remove("active"); btnRecord.textContent="REC"; }
  stopPb(); loop=false; document.getElementById("btnLoop").classList.remove("active");
  if (recEvents.length) { document.getElementById("btnPlay").disabled=false; document.getElementById("btnLoop").disabled=false; }
  setStatus("stopped");
});
document.getElementById("btnClear").addEventListener("click", function() {
  if (isPlay||isRec) return;
  recEvents=[]; document.getElementById("btnPlay").disabled=true; document.getElementById("btnLoop").disabled=true;
  loop=false; document.getElementById("btnLoop").classList.remove("active"); setStatus("cleared");
});

var cv=document.getElementById("waveCanvas"), cc=cv.getContext("2d");
(function draw(){
  requestAnimationFrame(draw);
  if(!analyser)return;
  var b=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(b);
  cc.clearRect(0,0,cv.width,cv.height);
  cc.lineWidth=2; cc.strokeStyle="rgba(255,45,120,0.8)";
  cc.shadowColor="#FF2D78"; cc.shadowBlur=10; cc.beginPath();
  for(var i=0;i<b.length;i++){var x=i*cv.width/b.length,y=(b[i]/128)*cv.height/2;i?cc.lineTo(x,y):cc.moveTo(x,y);}
  cc.lineTo(cv.width,cv.height/2); cc.stroke(); cc.shadowBlur=0;
})();
